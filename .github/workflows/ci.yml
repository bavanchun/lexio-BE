name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build / format / test / coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: restore tools
        run: dotnet tool restore

      - name: restore packages
        run: dotnet restore

      - name: verify format
        run: dotnet format --verify-no-changes --no-restore

      - name: build
        run: dotnet build --no-restore /warnaserror

      - name: test + collect coverage
        run: >
          dotnet test
          --no-build
          --collect:"XPlat Code Coverage"
          --settings .runsettings
          --results-directory TestResults
          --logger "trx;LogFileName=test-results.trx"
          --logger "console;verbosity=minimal"

      - name: generate coverage report
        run: >
          dotnet tool run reportgenerator
          -reports:"TestResults/**/coverage.cobertura.xml"
          -targetdir:coverage-report
          -reporttypes:"Html;TextSummary;Cobertura"

      - name: enforce coverage threshold
        # Foundation-only floor. Raise to 70% once first service ships.
        env:
          COVERAGE_FLOOR: '20'
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET, glob, sys, os
          floor = float(os.environ['COVERAGE_FLOOR'])
          files = glob.glob('coverage-report/Cobertura.xml')
          if not files:
              print("No Cobertura.xml found — skipping threshold check")
              sys.exit(0)
          root = ET.parse(files[0]).getroot()
          rate = float(root.attrib['line-rate']) * 100
          print(f"Line coverage: {rate:.2f}% (floor: {floor:.0f}%)")
          sys.exit(0 if rate >= floor else 1)
          PY

      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage-report
          retention-days: 14

  architecture:
    name: architecture tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: restore
        run: dotnet restore tests/architecture/Lexio.Architecture.Tests

      - name: build architecture tests
        run: dotnet build tests/architecture/Lexio.Architecture.Tests --no-restore /warnaserror

      - name: run architecture tests
        run: dotnet test tests/architecture/Lexio.Architecture.Tests --no-build --logger "console;verbosity=normal"

  security:
    name: security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: restore
        run: dotnet restore

      - name: check for vulnerable packages
        # Accepted advisories tracked here — reasons in Directory.Packages.props comments.
        # GHSA-4625-4j76-fww9: OpenTelemetry OTLP exporter disk-retry (opt-in via OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY env var, never set).
        # GHSA-g94r-2vxg-569j: OpenTelemetry.Api — informational; foundation has no exposed surface yet.
        env:
          ACCEPTED_ADVISORIES: 'GHSA-4625-4j76-fww9 GHSA-g94r-2vxg-569j'
        run: |
          out=$(dotnet list package --vulnerable --include-transitive 2>&1 || true)
          echo "$out"
          # Strip lines that mention only accepted advisories
          filtered=$(echo "$out" | awk -v skip="$ACCEPTED_ADVISORIES" '
            BEGIN { for (i=split(skip, arr, " "); i>0; i--) accepted[arr[i]] = 1 }
            /github\.com\/advisories\// {
              for (a in accepted) if (index($0, a)) { next }
            }
            { print }
          ')
          if echo "$filtered" | grep -q "has the following vulnerable packages"; then
            # Re-check whether any non-accepted advisories remain
            if echo "$filtered" | grep -qE "github\.com/advisories/"; then
              echo "::error::Unaccepted vulnerable NuGet packages found — upgrade or add to ACCEPTED_ADVISORIES with justification"
              exit 1
            fi
          fi

      - name: trivy config scan (Dockerfiles + compose)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'

  template-smoke:
    name: template smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: install Lexio.ServiceTemplate
        run: dotnet new install ./templates/Lexio.ServiceTemplate

      - name: scaffold Smoke service via new-service.sh
        run: bash scripts/new-service.sh Smoke

      - name: build scaffolded service
        run: dotnet build src/services/Smoke/Lexio.Smoke.Api/Lexio.Smoke.Api.csproj /warnaserror
